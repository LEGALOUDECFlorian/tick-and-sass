name: Deploy Frontend to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Set SvelteKit BASE for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "BASE=" >> $GITHUB_ENV
          else
            echo "BASE=/$REPO_NAME" >> $GITHUB_ENV
          fi

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build (adapter-static -> build/)
        working-directory: frontend
        env:
          BASE: ${{ env.BASE }}
        run: npm run build

      - name: I'm Dummy test ... Un Deux 🎤 Un Deux !
        run: |
          test -f frontend/build/index.html
          echo "Ok c'est bon pour moi"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
